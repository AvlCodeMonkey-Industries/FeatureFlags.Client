# Publish NuGet package on GitHub Release
name: Release NuGet Package

on:
  release:
    types: [published]

jobs:
  publish-nuget:
    name: Build and Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Setup DotNet
        uses: actions/setup-dotnet@v5.4.0
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: src/**/packages.lock.json

      - name: Restore DotNet dependencies
        run: dotnet restore --locked-mode

      - name: Build DotNet
        run: dotnet build --no-restore --configuration Release

      - name: Pack NuGet Package
        run: dotnet pack src/FeatureFlags.Client/FeatureFlags.Client.csproj --configuration Release --output ./nupkg

      - name: NuGet login
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: NuGet push
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{steps.login.outputs.NUGET_API_KEY}} --source https://api.nuget.org/v3/index.json --skip-duplicate
