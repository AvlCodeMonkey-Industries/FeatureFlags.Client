# Build, test, and scan solution
name: Main

on:
  push:
    branches: [ "main" ]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build-client:
    name: Build and Test Client Solution
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read

    steps:
    - uses: actions/checkout@v7.0.0

    - name: Setup DotNet
      uses: actions/setup-dotnet@v5.4.0
      with:
        global-json-file: global.json
        cache: true
        cache-dependency-path: src/**/packages.lock.json

    - name: Restore DotNet dependencies
      run: dotnet restore --locked-mode

    - name: Lint DotNet
      run: dotnet format FeatureFlags.Client.slnx --verify-no-changes --no-restore

    - name: Build DotNet
      run: dotnet build --no-restore --configuration Release

    - name: Test DotNet
      run: dotnet test --no-build --configuration Release --verbosity normal --logger "trx;LogFileName=test-results.trx"

    - name: Report Test Results
      uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
      if: always()
      with:
        name: DotNet Test Results
        path: '**/*.trx'
        reporter: dotnet-trx

  scan:
    name: SonarQube Scan
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7.0.0
      with:
        fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis

    - name: SonarQube Scan
      uses: SonarSource/sonarqube-scan-action@v8.2.0
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # runs only when other jobs succeed and it's a push into `main`
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build-client, scan]
    permissions:
      contents: write  # Give the default GITHUB_TOKEN write permission to commit version change
    if: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' && success() }}

    steps:
    - uses: actions/checkout@v7.0.0

    - name: Increment Version
      shell: pwsh
      run: |
        ./scripts/incrementVersion.ps1

    - name: Commit Version
      run: |
        git config user.email "avlcodemonkey@users.noreply.github.com"
        git config user.name "avlcodemonkey"
        # commit proj file that is being updated only
        git add src/FeatureFlags.Client/FeatureFlags.Client.csproj
        git commit -m "Automated version update [skip ci]"
        git push
